[phases.setup]
aptPkgs = [
    "ca-certificates", "fonts-liberation", "libasound2", "libatk1.0-0",
    "libcairo2", "libcups2", "libdbus-1-3", "libexpat1", "libfontconfig1",
    "libgbm1", "libglib2.0-0", "libgtk-3-0", "libnspr4", "libnss3",
    "libpango-1.0-0", "libx11-6", "libxcb1", "libxcomposite1",
    "libxdamage1", "libxext6", "libxfixes3", "libxrandr2",
    "libxshmfence1", "wget", "xdg-utils"
]

[phases.build]
cmds = ["npm install", "npx puppeteer browsers install chrome"]

[start]
cmd = "node relay-server.js"
